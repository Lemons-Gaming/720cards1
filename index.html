<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Gveret+Levin+AlefAlefAlef&family=Rubik:wght@400;500;700;900&family=Suez+One&family=Secular+One&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     מעטפת המסע — מארחת את ארבעת השלבים (כל שלב = קובץ נפרד ב-iframe).
     שפת העיצוב (עץ/פונטים/כפתורים) זהה למשחקים עצמם.
     ============================================================ */
  :root{
    --ink:#241046;
    --wood-dark:#3a1e0a; --wood:#8a4f22; --wood-lite:#b3712f;
    --rib: clamp(40px, 5.4vh, 54px);   /* גובה ריבון מחוון השלבים */
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; overflow:hidden; }
  body{
    font-family:'Rubik',system-ui,sans-serif; color:var(--ink);
    background-color:#caa9e0;
    background-image:url("images/רקע מעודכן.png");
    background-size:cover; background-position:center; background-repeat:no-repeat; background-attachment:fixed;
  }
  /* אותה שכבת גוון של game2 — לרצף חזותי במסכי הפתיחה/סיום */
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      linear-gradient(180deg, rgba(123,47,247,.30) 0%, rgba(31,143,255,.10) 38%, rgba(255,122,24,.18) 100%),
      radial-gradient(120% 75% at 50% 0%, rgba(255,210,140,.25), rgba(36,16,70,.0) 60%);
    mix-blend-mode:multiply;
  }

  /* ===================== ריבון מחוון שלבים (שלט-עץ) ===================== */
  .ribbon{
    position:fixed; top:0; left:0; right:0; height:var(--rib); z-index:50;
    display:flex; align-items:center; justify-content:space-between; gap:12px; padding:0 14px;
    background:linear-gradient(180deg, rgba(36,16,70,.95), rgba(36,16,70,.82));
    border-bottom:4px solid rgba(255,194,51,.8);
    box-shadow:0 4px 16px rgba(0,0,0,.5);
  }
  .ribbon[hidden]{ display:none; }
  .ribbon-text{
    flex:1 1 auto; text-align:center;
    font-family:'Rubik','Suez One',sans-serif; font-weight:900; letter-spacing:.3px;
    font-size:clamp(.82rem,1.5vw,1.25rem); color:#fff5d8;
    -webkit-text-stroke:2.2px #20100a; paint-order:stroke fill;
    text-shadow:0 1px 0 #2c1505,0 2px 0 #2c1505,0 3px 0 #2c1505,0 5px 8px rgba(0,0,0,.5);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  /* מסלול-מיני: 4 תחנות שמתעדכן עם ההתקדמות (תמיד גלוי בזמן המשחק) */
  .ribbon-track{ flex:0 0 auto; display:flex; align-items:center; gap:5px; }
  .rdot{
    width:clamp(19px,2.5vw,25px); height:clamp(19px,2.5vw,25px); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Rubik',sans-serif; font-weight:900; font-size:clamp(.6rem,1vw,.78rem);
    color:#fff; border:2px solid var(--wood-dark); -webkit-text-stroke:.5px var(--wood-dark); paint-order:stroke fill;
    background:linear-gradient(180deg,#b3712f,#7c451d); box-shadow:0 2px 0 #2c1505;
  }
  .rdot.rdone{ background:linear-gradient(180deg,#62d06d,#2f8f3c); border-color:#1c5a25; }
  .rdot.rcur{ color:var(--ink); -webkit-text-stroke:0; background:linear-gradient(180deg,#ffe07a,#ffbe2e); border-color:#7c451d; box-shadow:0 0 0 3px rgba(255,210,77,.55), 0 2px 0 #2c1505; }
  .rib-fs{
    flex:0 0 auto; cursor:pointer; font-family:'Rubik',sans-serif; font-weight:900;
    color:#fff5d8; -webkit-text-stroke:1px var(--wood-dark); paint-order:stroke fill;
    font-size:clamp(.95rem,1.6vw,1.25rem); line-height:1;
    border:2px solid var(--wood-dark); border-radius:9px; padding:5px 11px;
    background:linear-gradient(180deg,#caa24a,#9a7320); box-shadow:0 3px 0 #5e4512;
    transition:transform .07s, box-shadow .07s, filter .12s;
  }
  .rib-fs:hover{ filter:brightness(1.08); }
  .rib-fs:active{ transform:translateY(2px); box-shadow:0 1px 0 #5e4512; }

  /* ===================== במת המשחק (iframe) ===================== */
  #frame{
    position:fixed; left:0; right:0; bottom:0; top:var(--rib);
    width:100%; height:calc(100% - var(--rib));
    border:0; z-index:10; background:transparent; display:none;
  }
  #frame.show{ display:block; }

  /* ===================== שכבת מעבר (fade) ===================== */
  .fade{
    position:fixed; inset:0; z-index:60; pointer-events:none; opacity:0;
    transition:opacity .35s ease;
    background:#2a134e;
  }
  .fade.on{ opacity:1; }

  /* ===================== מסכי פתיחה/סיום ===================== */
  .screen{
    position:fixed; inset:0; z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(16px,3vh,28px); text-align:center; padding:24px;
  }
  .screen[hidden]{ display:none; }

  /* לוגו שלט-עץ (זהה לסגנון המשחקים) */
  .logo{
    position:relative; max-width:92vw; text-align:center;
    padding:14px 40px 18px; border-radius:20px; border:5px solid var(--wood-dark);
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,.07) 0 6px, rgba(255,255,255,.05) 6px 12px),
      linear-gradient(180deg,#a9682f,#8a4f22 58%,#6e3d18);
    box-shadow:0 9px 0 #2c1505, 0 16px 30px rgba(0,0,0,.55), inset 0 2px 0 rgba(255,255,255,.28);
    transform:rotate(-1.2deg);
  }
  .logo::before, .logo::after{
    content:""; position:absolute; top:9px; width:13px; height:13px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #c4c4c4 42%, #6b6b6b 76%, #333);
    box-shadow:0 1px 2px rgba(0,0,0,.7);
  }
  .logo::before{ right:12px; } .logo::after{ left:12px; }
  .logo-text{
    display:inline-block;
    font-family:'Rubik','Suez One',sans-serif; font-weight:900; letter-spacing:.4px;
    font-size:clamp(1.3rem,3.4vw,2.45rem); line-height:1.18;
    color:#fff5d8;
    -webkit-text-stroke:4px #20100a; paint-order:stroke fill;
    text-shadow:0 1px 0 #2c1505,0 2px 0 #2c1505,0 3px 0 #2c1505,0 4px 0 #2c1505,0 5px 0 #2c1505,0 8px 12px rgba(0,0,0,.55);
  }
  .sub{
    font-family:'Gveret Levin AlefAlefAlef','Rubik',cursive; font-weight:400; color:#fff3d0;
    direction:rtl; font-size:clamp(1.7rem,4vw,3rem); line-height:1.25; min-height:1.5em;
    -webkit-text-stroke:1px var(--wood-dark); paint-order:stroke fill;
    text-shadow:0 2px 0 #4a2a10, 0 3px 7px rgba(0,0,0,.45);
  }
  .sub .cursor{ -webkit-text-stroke:0; font-weight:400; margin-inline-start:2px; animation:blink .7s steps(1) infinite; }
  @keyframes blink{ 0%,50%{opacity:1;} 50.01%,100%{opacity:0;} }
  .steps-hint{
    font-family:'Rubik',sans-serif; font-weight:700; color:#fff;
    font-size:clamp(.82rem,1.4vw,1.05rem); line-height:1.7; opacity:.95;
    -webkit-text-stroke:.8px var(--wood-dark); paint-order:stroke fill; text-shadow:0 1px 0 #2c1505;
  }

  /* כפתורי עץ (זהים למשחקים) */
  .btn3d{
    font-family:'Rubik',sans-serif; font-weight:900;
    font-size:clamp(.9rem,1.4vw,1.15rem);
    color:#fff; -webkit-text-stroke:1.8px var(--wood-dark); paint-order:stroke fill;
    text-shadow:0 2px 0 #2c1505;
    border:3px solid var(--wood-dark); border-radius:14px;
    padding:13px 30px; cursor:pointer; position:relative; white-space:nowrap;
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,.06) 0 5px, rgba(255,255,255,.05) 5px 10px),
      linear-gradient(180deg,#b3712f,#8a4f22);
    box-shadow:0 6px 0 #2c1505, 0 9px 15px rgba(0,0,0,.45), inset 0 2px 0 rgba(255,255,255,.28);
    transition:transform .07s ease, box-shadow .07s ease, filter .12s;
  }
  .btn3d:hover{ filter:brightness(1.08); }
  .btn3d:active{ transform:translateY(5px); box-shadow:0 1px 0 #2c1505, 0 3px 7px rgba(0,0,0,.4), inset 0 2px 0 rgba(255,255,255,.2); }
  .btn-check  { background:repeating-linear-gradient(90deg, rgba(0,0,0,.06) 0 5px, rgba(255,255,255,.05) 5px 10px), linear-gradient(180deg,#62d06d,#2f8f3c); box-shadow:0 6px 0 #1c5a25, 0 9px 15px rgba(0,0,0,.45), inset 0 2px 0 rgba(255,255,255,.3); }
  .btn-check:active  { box-shadow:0 1px 0 #1c5a25, 0 3px 7px rgba(0,0,0,.4), inset 0 2px 0 rgba(255,255,255,.2); }
  .btn-shuffle{ background:repeating-linear-gradient(90deg, rgba(0,0,0,.06) 0 5px, rgba(255,255,255,.05) 5px 10px), linear-gradient(180deg,#ff9a3d,#d35e10); box-shadow:0 6px 0 #8a3d08, 0 9px 15px rgba(0,0,0,.45), inset 0 2px 0 rgba(255,255,255,.3); }
  .btn-shuffle:active{ box-shadow:0 1px 0 #8a3d08, 0 3px 7px rgba(0,0,0,.4), inset 0 2px 0 rgba(255,255,255,.2); }

  /* פלאקת ברכה (זהה למשחקים) */
  .greet{
    font-family:'Rubik',sans-serif; font-weight:900;
    color:#ffd24d; -webkit-text-stroke:2.5px var(--wood-dark); paint-order:stroke fill;
    text-shadow:0 3px 0 #6b3d12;
    background:linear-gradient(180deg,#fff7e0,#ffe39a);
    -webkit-text-fill-color:initial;
    font-size:clamp(1.2rem,2.6vw,2rem);
    padding:14px 36px; border-radius:18px; border:4px solid var(--wood-dark);
    box-shadow:0 8px 0 #6b3d12, 0 14px 24px rgba(0,0,0,.5);
    max-width:92vw;
  }
  .score-line{
    font-family:'Rubik',sans-serif; font-weight:900; color:#fff5d8;
    font-size:clamp(1.1rem,2.4vw,1.8rem);
    -webkit-text-stroke:2px var(--wood-dark); paint-order:stroke fill;
    text-shadow:0 2px 0 #2c1505, 0 4px 10px rgba(0,0,0,.5);
  }

  /* הודעת מערכת (מסך מלא חסום) */
  .htoast{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%) translateY(20px); z-index:120;
    font-family:'Rubik',sans-serif; font-weight:900; color:#fff; -webkit-text-stroke:1.1px var(--wood-dark); paint-order:stroke fill;
    background:linear-gradient(180deg,#b3712f,#7c451d); border:3px solid var(--wood-dark);
    font-size:clamp(.85rem,1.5vw,1.1rem); padding:11px 22px; border-radius:14px; max-width:90vw; text-align:center; line-height:1.35;
    box-shadow:0 6px 0 #2c1505, 0 12px 22px rgba(0,0,0,.45); opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
  }
  .htoast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  #fx{ position:fixed; inset:0; pointer-events:none; z-index:90; }
</style>
</head>
<body>

  <!-- מחוון שלבים אחיד: מיני-מסלול + כותרת + כפתור מסך מלא -->
  <div class="ribbon" id="ribbon" hidden>
    <div class="ribbon-track" id="ribbonTrack"></div>
    <span class="ribbon-text" id="ribbonText"></span>
    <button class="rib-fs" id="ribFs" title="מסך מלא" aria-label="מסך מלא">⛶</button>
  </div>

  <!-- במת השלב הנוכחי -->
  <iframe id="frame" allow="fullscreen" allowfullscreen title="במת המשחק"></iframe>

  <!-- שכבת מעבר -->
  <div class="fade" id="fade"></div>

  <!-- מסך פתיחה -->
  <div class="screen" id="opening">
    <div class="logo"><span class="logo-text">איך לומדים בתוכנית 720?</span></div>
    <div class="sub"><span id="subText"></span><span class="cursor" id="subCursor">|</span></div>
    <button class="btn3d btn-check" id="btnStart" style="font-size:1.4rem; padding:16px 44px">▶ התחל</button>
  </div>

  <!-- מסך סיום כולל -->
  <div class="screen" id="ending" hidden>
    <div class="greet" id="endGreet">🎉 כל הכבוד! סיימת את כל מסע השיעור! 🎉</div>
    <div class="score-line" id="endScore"></div>
    <button class="btn3d btn-shuffle" id="btnRestart" style="font-size:1.25rem; padding:15px 40px">↺ שחק שוב מההתחלה</button>
  </div>

  <canvas id="fx"></canvas>
  <div class="htoast" id="htoast"></div>

<script>
/* =========================================================
   מנגנון המעטפת: טוען כל שלב כקובץ נפרד ב-iframe ומאזין
   להודעות postMessage מכל משחק כדי לעדכן את מחוון השלבים
   ולעבור בין השלבים. אפס שינוי בלוגיקה של המשחקים עצמם.
   ========================================================= */
const STAGE1 = 'game1.html';   // שלב 1
const STAGE2 = 'game2.html';   // שלבים 2–4 (זרימה פנימית: סידור → שאלון → ליקוט)

const frame      = document.getElementById('frame');
const ribbon     = document.getElementById('ribbon');
const ribbonText = document.getElementById('ribbonText');
const ribbonTrack= document.getElementById('ribbonTrack');
const fade       = document.getElementById('fade');
const opening    = document.getElementById('opening');
const ending     = document.getElementById('ending');
const endScore   = document.getElementById('endScore');
const htoast     = document.getElementById('htoast');

const FADE_MS = 360;

/* ====== נתוני 4 השלבים (כותרת קצרה + אייקון) ====== */
const STAGES = [
  { n:1, title:'סדר השיעור הרגיל',   ic:'⏰' },
  { n:2, title:'סדר השיעור המותאם',  ic:'🧩' },
  { n:3, title:'שאלון',              ic:'❓' },
  { n:4, title:'איסוף ההיגדים',      ic:'🎯' }
];
let currentStage = 1;

/* מיני-מסלול בריבון (תמיד גלוי בזמן המשחק) */
function renderRibbonTrack(){
  ribbonTrack.innerHTML = STAGES.map(s=>{
    const done=s.n<currentStage, cur=s.n===currentStage;
    return '<span class="rdot'+(done?' rdone':'')+(cur?' rcur':'')+'">'+(done?'✓':s.n)+'</span>';
  }).join('');
}
/* עדכון מרכזי של חיווי ההתקדמות — מפעיל גם את המפה וגם את הריבון */
function setStage(n, title){
  currentStage = n;
  ribbonText.textContent = 'שלב '+n+' מתוך 4 — '+title;
  ribbon.hidden = false;
  renderRibbonTrack();
}

/* ====== מסך מלא (מהמארח — חלון עליון, אמין) ====== */
const FS_MSG = 'כדי לעבור למסך מלא, פתחו את קובץ המשחק ישירות בדפדפן (לא בתצוגה המוטמעת) ולחצו על ⛶';
let htoastT=null;
function showHtoast(msg){ htoast.textContent=msg; htoast.classList.add('show'); clearTimeout(htoastT); htoastT=setTimeout(()=>htoast.classList.remove('show'), 6500); }
function goFullscreen(){
  const el=document.documentElement;
  const fsEl=document.fullscreenElement||document.webkitFullscreenElement;
  if(fsEl){ (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document); return; }
  const req=el.requestFullscreen||el.webkitRequestFullscreen;          // טיפול בקידומות
  if(!req){ showHtoast(FS_MSG); return; }
  try{
    const p=req.call(el);                                              // נקרא ישירות מהקליק, על אלמנט השורש של המארח (חלון עליון)
    if(p&&typeof p.catch==='function') p.catch(()=>showHtoast(FS_MSG));
  }catch(e){ showHtoast(FS_MSG); }
}
document.getElementById('ribFs').addEventListener('click', ()=>{ blip(300,.06,'square',.06); goFullscreen(); });

/* מעבר עם fade: מכסה → מבצע cb → טוען → חושף */
function fadeSwap(cb){
  fade.classList.add('on');
  setTimeout(()=>{
    cb();
    frame.onload = ()=>{ frame.onload=null; setTimeout(()=>fade.classList.remove('on'), 60); };
  }, FADE_MS);
}
function loadStage(src){
  fadeSwap(()=>{ frame.classList.add('show'); frame.src=src; });
}

/* התחלה */
document.getElementById('btnStart').addEventListener('click', ()=>{
  blip(300,.06,'square',.06);
  fade.classList.add('on');
  setTimeout(()=>{
    opening.hidden=true; ribbon.hidden=false;
    currentStage=1; renderRibbonTrack();
    frame.classList.add('show');
    frame.onload=()=>{ frame.onload=null; setTimeout(()=>fade.classList.remove('on'),60); };
    frame.src=STAGE1;
  }, FADE_MS);
});

/* שחק שוב — חזרה לשלב 1 */
document.getElementById('btnRestart').addEventListener('click', ()=>{
  blip(300,.06,'square',.06);
  fade.classList.add('on');
  setTimeout(()=>{
    ending.hidden=true; ribbon.hidden=false;
    currentStage=1; renderRibbonTrack();
    frame.classList.add('show');
    frame.onload=()=>{ frame.onload=null; setTimeout(()=>fade.classList.remove('on'),60); };
    frame.src=STAGE1;
  }, FADE_MS);
});

/* מסך סיום כולל */
function showEnding(score){
  fade.classList.add('on');
  setTimeout(()=>{
    frame.classList.remove('show'); frame.src='about:blank';
    ribbon.hidden=true;
    endScore.textContent = (typeof score==='number')
      ? ('ניקוד שלב האיסוף: '+score+' מתוך 150')
      : '';
    ending.hidden=false;
    fireConfetti();
    setTimeout(()=>fade.classList.remove('on'), 60);
  }, FADE_MS);
}

/* האזנה להודעות מהמשחקים */
window.addEventListener('message', (e)=>{
  const m = e.data || {};
  if(m.type==='stage'){ setStage(m.n, m.title); }  // מעדכן כותרת + מיני-מסלול + מפה
  else if(m.type==='next'){ loadStage(STAGE2); }   // שלב 1 הושלם → טוענים את שלבים 2–4
  else if(m.type==='done'){ showEnding(m.score); } // שלב 4 הושלם → מסך סיום כולל
});

/* ====== אנימציית הקלדה לכותרת המשנה (כיוון עברי: מימין לשמאל, אות-אחר-אות) ====== */
const SUB_TEXT = 'לומדים ללמוד אחרת';
(function typeSub(){
  const el=document.getElementById('subText');
  let i=0; el.textContent='';
  const iv=setInterval(()=>{
    el.textContent = SUB_TEXT.slice(0, ++i);   // dir=rtl → הטקסט גדל מימין לשמאל, האות הראשונה מימין
    if(i>=SUB_TEXT.length) clearInterval(iv);
  }, 115);
})();

/* ======================= סאונד קצר לכפתורי המעטפת ======================= */
let actx=null;
function audio(){ if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); return actx; }
function blip(freq=600,dur=.08,type='square',gain=.06){
  const c=audio(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(c.destination);
  const t=c.currentTime; g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.start(t); o.stop(t+dur);
}
function winSound(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,.18,'triangle',.08), i*120)); }

/* ======================= קונפטי למסך הסיום ======================= */
const fx=document.getElementById('fx'), fctx=fx.getContext('2d');
let parts=[], fxAnim=null;
function sizeFx(){ fx.width=innerWidth; fx.height=innerHeight; }
sizeFx(); addEventListener('resize', sizeFx);
const COLORS=['#ff7a18','#ffc233','#ff3d77','#7b2ff7','#1f8fff','#22c55e','#ff3b3b'];
function emit(x,y,count,spread,power){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*power;
    parts.push({ x,y, vx:Math.cos(a)*sp*spread, vy:Math.sin(a)*sp - power*.4,
      g:.35+Math.random()*.2, s:5+Math.random()*7, rot:Math.random()*6.28, vr:(Math.random()-.5)*.4,
      c:COLORS[(Math.random()*COLORS.length)|0], life:0, max:70+Math.random()*50 });
  }
  if(!fxAnim) fxAnim=requestAnimationFrame(tickFx);
}
function fireConfetti(){ winSound(); emit(innerWidth/2, innerHeight*0.4, 240, 1.6, 18); }
function tickFx(){
  fctx.clearRect(0,0,fx.width,fx.height);
  parts=parts.filter(p=>p.life<p.max);
  parts.forEach(p=>{ p.life++; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.vx*=.99; p.rot+=p.vr;
    fctx.save(); fctx.translate(p.x,p.y); fctx.rotate(p.rot);
    fctx.globalAlpha=Math.max(0,1-p.life/p.max); fctx.fillStyle=p.c;
    fctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); fctx.restore(); });
  if(parts.length) fxAnim=requestAnimationFrame(tickFx);
  else{ fctx.clearRect(0,0,fx.width,fx.height); fxAnim=null; }
}
</script>
</body>
